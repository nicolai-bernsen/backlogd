name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate plugin + hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Manifest well-formedness (python fallback) ---------------------
      # These two python JSON checks are kept as the BLOCKING fallback for
      # `claude plugin validate` (below). They assert plugin.json/marketplace.json
      # parse and carry the minimum required fields. Retained per AC even though
      # the verified `claude plugin validate .` gate now also blocks.
      - name: Validate plugin manifest
        run: |
          python3 - <<'PY'
          import json
          with open('.claude-plugin/plugin.json') as f:
              manifest = json.load(f)
          assert manifest.get('name'), "plugin.json must declare a non-empty 'name'"
          print(f"plugin.json OK — name={manifest['name']} version={manifest.get('version', '-')}")
          PY

      - name: Validate marketplace manifest
        run: |
          python3 - <<'PY'
          import json
          with open('.claude-plugin/marketplace.json') as f:
              market = json.load(f)
          assert market.get('plugins'), "marketplace.json must list at least one plugin"
          print(f"marketplace.json OK — {len(market['plugins'])} plugin(s)")
          PY

      - name: Check required hygiene files
        run: |
          missing=0
          for f in LICENSE README.md CONTRIBUTING.md SECURITY.md .gitignore; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "All required hygiene files present"

      - name: Validate templates
        run: |
          python3 - <<'PY'
          import pathlib, sys

          required = {
              "templates/spec.md": ["## Acceptance Criteria"],
              "templates/solution-brief.md": ["## What changed", "## How it was verified"],
          }

          failures = []
          for path, headings in required.items():
              p = pathlib.Path(path)
              if not p.is_file():
                  failures.append(f"missing file: {path}")
                  continue
              body = p.read_text(encoding="utf-8")
              for heading in headings:
                  if heading not in body:
                      failures.append(f"{path}: missing heading {heading!r}")

          if failures:
              print("Template validation failed:")
              for f in failures:
                  print(f"  - {f}")
              sys.exit(1)

          print("templates/spec.md and templates/solution-brief.md OK — required headings present")
          PY

      - name: Run test suites
        run: python3 -m unittest discover -s scripts -p 'test_*.py'

      - name: Witness — shipped-fix markers still in tree
        run: python3 scripts/witness.py

      # --- pre-commit (BLOCKING) ------------------------------------------
      # Runs the repo .pre-commit-config.yaml: markdownlint-cli2, file-hygiene
      # hooks, check-json/check-yaml, and the scoped (.py-only) ruff hook.
      # pre-commit/action does not install Python itself, so setup-python first.
      - name: Set up Python for pre-commit
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      - name: Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

      # --- claude plugin validate (BLOCKING) ------------------------------
      # Pinned Claude Code CLI, then `claude plugin validate .`. Verified during
      # NB-288 to exit non-zero on a malformed/invalid manifest in a headless
      # (unauthenticated, empty-HOME) context — validate is a pure offline schema
      # check needing no auth — so it is a blocking gate. The two python JSON
      # checks above remain as the documented fallback. NOTE: --strict is NOT
      # used: the baseline marketplace.json emits a benign "no description"
      # warning that --strict would turn into a false failure.
      - name: Install Claude Code CLI (pinned)
        run: npm install -g @anthropic-ai/claude-code@2.1.149
      - name: Validate plugin manifest (claude plugin validate)
        run: claude plugin validate .

      # --- actionlint (BLOCKING) ------------------------------------------
      # Lints every workflow under .github/workflows. Verified during NB-288 to
      # exit non-zero on a malformed ${{ }} expression / undefined context.
      - name: Lint workflows (actionlint)
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca  # v1.7.12

      # --- lychee internal/relative links only (BLOCKING) -----------------
      # --offline checks file existence for local/relative links and makes ZERO
      # network calls, so NO external links are checked here (external-link
      # scanning is a separate advisory scheduled workflow, out of scope for T3).
      # Verified during NB-288 to exit non-zero on a dead relative link.
      # fail: true (default) fails the job on a broken link; failIfEmpty guards
      # against the glob silently matching nothing.
      - name: Check internal links (lychee, offline)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: "--offline --no-progress './**/*.md'"
          fail: true
          failIfEmpty: true
