name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate plugin + hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin manifest
        run: |
          python3 - <<'PY'
          import json
          with open('.claude-plugin/plugin.json') as f:
              manifest = json.load(f)
          assert manifest.get('name'), "plugin.json must declare a non-empty 'name'"
          print(f"plugin.json OK — name={manifest['name']} version={manifest.get('version', '-')}")
          PY

      - name: Validate marketplace manifest
        run: |
          python3 - <<'PY'
          import json
          with open('.claude-plugin/marketplace.json') as f:
              market = json.load(f)
          assert market.get('plugins'), "marketplace.json must list at least one plugin"
          print(f"marketplace.json OK — {len(market['plugins'])} plugin(s)")
          PY

      - name: Check required hygiene files
        run: |
          missing=0
          for f in LICENSE README.md CONTRIBUTING.md SECURITY.md .gitignore; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "All required hygiene files present"

      - name: Validate templates
        run: |
          python3 - <<'PY'
          import pathlib, sys

          required = {
              "templates/spec.md": ["## Acceptance Criteria"],
              "templates/solution-brief.md": ["## What changed", "## How it was verified"],
          }

          failures = []
          for path, headings in required.items():
              p = pathlib.Path(path)
              if not p.is_file():
                  failures.append(f"missing file: {path}")
                  continue
              body = p.read_text(encoding="utf-8")
              for heading in headings:
                  if heading not in body:
                      failures.append(f"{path}: missing heading {heading!r}")

          if failures:
              print("Template validation failed:")
              for f in failures:
                  print(f"  - {f}")
              sys.exit(1)

          print("templates/spec.md and templates/solution-brief.md OK — required headings present")
          PY
