name: Bug report
description: Report something in backlogd that behaves incorrectly or unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please describe the problem clearly enough that someone can reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: When I run `/backlogd:pull`, ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The command(s) you ran and any configuration that matters.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: backlogd version
      description: The `version` in `.claude-plugin/plugin.json`, or the marketplace version you installed.
      placeholder: "0.8.0"
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Claude Code version, and anything else relevant (e.g. which issue backend).
      placeholder: macOS 15 - Claude Code 2.x - Linear
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
